<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#02050f"/>
      <stop offset="48%" stop-color="#06122a"/>
      <stop offset="100%" stop-color="#0b1c39"/>
    </linearGradient>

    <radialGradient id="glowTop" cx="0.82" cy="0.2" r="0.34">
      <stop offset="0%" stop-color="#5a7ec8" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#5a7ec8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="milkyWay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6cc2ff" stop-opacity="0.04"/>
      <stop offset="23%" stop-color="#8fd0ff" stop-opacity="0.16"/>
      <stop offset="50%" stop-color="#d7e7ff" stop-opacity="0.34"/>
      <stop offset="72%" stop-color="#ffc98e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8ea3ff" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>

    <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glowTop)"/>

